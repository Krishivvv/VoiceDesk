name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.15.20
      - run: ruff check .

  test:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system deps (ffmpeg + portaudio)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg libportaudio2

      - name: Install CPU PyTorch
        run: pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install project (dev)
        run: pip install -r requirements-dev.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-all-MiniLM-L6-v2

      - name: Run tests (unit + RAG integration)
        run: pytest -q
