name: Sync to Hugging Face Space

# Pushes the audio_support_agent/ subtree to a Hugging Face Space on every
# push to main. The app lives in a subdirectory, so we split it out and push
# that subtree as the Space's repository root.
#
# Required repository secrets:
#   HF_TOKEN     - a Hugging Face write token (Settings > Access Tokens)
# Required repository variables (Settings > Variables):
#   HF_USERNAME  - your Hugging Face username/org (e.g. "krishivvv")
#   HF_SPACE     - the Space name (e.g. "voicedesk")

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push subtree to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git subtree split --prefix audio_support_agent -b hf-deploy
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            hf-deploy:main
