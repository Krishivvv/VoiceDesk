name: Sync to Hugging Face Space

# Mirrors this repository to a Hugging Face Space on every push to main.
# The repository root is the app (Dockerfile, README front matter, src/...),
# so we push the checked-out commit straight to the Space's main branch.
#
# Required repository secret:
#   HF_TOKEN     - a Hugging Face write token (Settings > Access Tokens)
# Required repository variables (Settings > Variables):
#   HF_USERNAME  - your Hugging Face username/org (e.g. "krishivvv")
#   HF_SPACE     - the Space name (e.g. "voicedesk")

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          git push --force \
            "https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE}.git" \
            HEAD:main
